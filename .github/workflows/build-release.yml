name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Install Node dependencies (root)
        run: npm ci
      
      - name: Install Node dependencies (frontend)
        run: |
          cd src-ui
          npm ci
      
      - name: Download AI models
        run: npm run download-models
      
      - name: Verify models downloaded
        run: |
          Write-Output "Checking models directory..."
          if (!(Test-Path "models\speaker_recognition.onnx")) {
            Write-Error "Voiceprint model not found!"
            exit 1
          }
          if (!(Test-Path "models\sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20")) {
            Write-Error "ASR model not found!"
            exit 1
          }
          if (!(Test-Path "models\sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01")) {
            Write-Error "KWS model not found!"
            exit 1
          }
          Write-Output "✓ All models found"
          Get-ChildItem models -Recurse -File | Measure-Object -Property Length -Sum | ForEach-Object {
            Write-Output "Total models size: $([math]::Round($_.Sum/1MB,2)) MB"
          }
      
      - name: Package Python backend with PyInstaller
        run: pyinstaller voicetype-server.spec
      
      - name: Ensure models are included (fallback)
        run: |
          if (!(Test-Path "dist\voicetype-server\models")) {
            Write-Output "Models not found in package, copying manually..."
            Copy-Item -Path "models" -Destination "dist\voicetype-server\" -Recurse -Force
            Write-Output "✓ Models copied manually"
          } else {
            Write-Output "✓ Models already included by PyInstaller"
          }
      
      - name: Verify Python package
        run: |
          if (!(Test-Path "dist\voicetype-server\voicetype-server.exe")) {
            Write-Error "PyInstaller output not found!"
            exit 1
          }
          if (!(Test-Path "dist\voicetype-server\models")) {
            Write-Error "Models not included in package!"
            exit 1
          }
          Write-Output "✓ PyInstaller package created successfully"
          Get-ChildItem "dist\voicetype-server" -Recurse -File | Measure-Object -Property Length -Sum | ForEach-Object {
            Write-Output "Package size: $([math]::Round($_.Sum/1MB,2)) MB"
          }
          Get-ChildItem "dist\voicetype-server\models" -Recurse -File | Measure-Object -Property Length -Sum | ForEach-Object {
            Write-Output "Models size: $([math]::Round($_.Sum/1MB,2)) MB"
          }
      
      - name: Build Tauri application
        run: npm run build
      
      - name: Verify build output
        run: |
          if (!(Test-Path "src-tauri/target/release/bundle/nsis/*.exe")) {
            Write-Error "NSIS installer not found!"
            exit 1
          }
          Get-Item "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}
      
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: VoiceType-Windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  build-macos:
    runs-on: macos-14  # 只构建 Apple Silicon (aarch64)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Install Node dependencies (root)
        run: npm ci
      
      - name: Install Node dependencies (frontend)
        run: |
          cd src-ui
          npm ci
      
      - name: Download AI models
        run: npm run download-models
      
      - name: Verify models downloaded
        run: |
          echo "Checking models directory..."
          if [ ! -f "models/speaker_recognition.onnx" ]; then
            echo "Voiceprint model not found!"
            exit 1
          fi
          echo "✓ Voiceprint model found"
          du -sh models/
      
      - name: Package Python backend with PyInstaller
        run: pyinstaller voicetype-server.spec
      
      - name: Ensure models are included (fallback)
        run: |
          if [ ! -d "dist/voicetype-server/models" ]; then
            echo "Models not found in package, copying manually..."
            cp -r models dist/voicetype-server/
            echo "✓ Models copied manually"
          else
            echo "✓ Models already included by PyInstaller"
          fi
      
      - name: Verify Python package
        run: |
          if [ ! -f "dist/voicetype-server/voicetype-server" ]; then
            echo "PyInstaller output not found!"
            exit 1
          fi
          if [ ! -d "dist/voicetype-server/models" ]; then
            echo "Models not included in package!"
            exit 1
          fi
          echo "✓ PyInstaller package created successfully"
          du -sh dist/voicetype-server/
          du -sh dist/voicetype-server/models/
      
      - name: Build Tauri application
        run: npm run build
      
      - name: Verify build output
        run: |
          if ! ls src-tauri/target/release/bundle/dmg/*.dmg 1> /dev/null 2>&1; then
            echo "DMG installer not found!"
            exit 1
          fi
          ls -lh src-tauri/target/release/bundle/dmg/*.dmg
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceType-macOS-AppleSilicon
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
